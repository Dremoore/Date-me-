<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Will You Date Me? ❤️</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&display=swap');

    :root { --pink: #ff4d94; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #fff0f5 0%, #ffe4f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { 
      width: 100%; 
      max-width: 420px; 
      padding: 20px; 
      text-align: center; 
      position: relative; 
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.7rem;
      color: var(--pink);
      margin-bottom: 40px;
      line-height: 1.1;
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.5s; }

    @keyframes fadeIn { 
      from {opacity:0; transform:translateY(20px);} 
      to {opacity:1; transform:translateY(0);} 
    }

    .yes-btn {
      background: linear-gradient(45deg, #ff4d94, #ff6ba8);
      color: white;
      font-size: 1.65rem;
      font-weight: bold;
      padding: 18px 40px;
      border: none;
      border-radius: 50px;
      width: 85%;
      max-width: 280px;
      margin: 15px auto;
      display: block;
      box-shadow: 0 10px 30px rgba(255,77,148,0.4);
      cursor: pointer;
    }
    .yes-btn:active { transform: scale(0.95); }

    .no-btn {
      background: white;
      color: #555;
      padding: 12px 32px;
      border: 2px solid #ddd;
      border-radius: 50px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      margin: 15px auto;
      display: block;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Calendar */
    .calendar {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin: 20px auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-weight: bold;
      color: var(--pink);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
    }
    .weekday { font-size: 0.9rem; color: #888; padding: 5px 0; }
    .day {
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.05rem;
    }
    .day.past { color: #ccc; pointer-events: none; }
    .day.today { background: #ffe4f0; font-weight: bold; }
    .day.selected { background: var(--pink); color: white; }

    /* Food */
    .dinner-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 25px 0;
    }
    .food-option {
      background: white;
      border-radius: 18px;
      padding: 15px 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .food-option:active { transform: scale(0.92); }
    .food-option.selected {
      border: 4px solid var(--pink);
      background: #fff0f5;
    }
    .food-emoji { font-size: 2.8rem; margin-bottom: 6px; }

    .final-message {
      font-family: 'Great Vibes', cursive;
      font-size: 2.6rem;
      color: var(--pink);
      line-height: 1.2;
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Screen 1 -->
    <div id="screen1" class="screen active">
      <h1>Will you date me?</h1>
      <button class="yes-btn" onclick="nextScreen(2)">YES ❤️</button>
      <button id="noBtn" class="no-btn">No</button>
    </div>

    <!-- Screen 2: Calendar -->
    <div id="screen2" class="screen">
      <h1>When are we going? 🌹</h1>
      <div class="calendar">
        <div class="calendar-header">
          <button onclick="prevMonth()">←</button>
          <span id="monthTitle"></span>
          <button onclick="nextMonth()">→</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <select id="time" style="padding:14px; font-size:1.1rem; border-radius:12px; border:2px solid #ffb3d1; margin-top:10px; width:85%; display:block; margin:15px auto;">
        <option value="">Choose Time</option>
        <option value="7:00 PM - 9:00 PM">7:00 PM - 9:00 PM</option>
        <option value="8:00 PM - 10:00 PM">8:00 PM - 10:00 PM</option>
        <option value="9:00 PM - 11:00 PM">9:00 PM - 11:00 PM</option>
        <option value="10:00 PM - 12:00 AM">10:00 PM - 12:00 AM 🌙</option>
      </select>
      <button class="yes-btn" onclick="nextScreen(3)" id="nextBtn2" style="display:none;">Next →</button>
    </div>

    <!-- Screen 3: Food -->
    <div id="screen3" class="screen">
      <h1>What should we eat? 🍽️</h1>
      <div class="dinner-grid" id="foodGrid"></div>
      <button id="proceedBtn" class="yes-btn" onclick="nextScreen(4)" style="display:none;">Proceed ❤️</button>
    </div>

    <!-- Screen 4: Final -->
    <div id="screen4" class="screen">
      <div class="final-message">Our date is set!<br>Can't wait to see you ❤️</div>
      <p id="dateSummary" style="font-size:1.3rem; color:#444; margin-top:20px;"></p>
    </div>
  </div>

  <script>
    let selectedDate = "";
    let selectedFood = "";
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    const noBtn = document.getElementById('noBtn');

    function moveNoButton() {
      const maxX = 180;
      const x = Math.random() * maxX - 60;
      noBtn.style.transform = `translate(${x}px, ${Math.random() * 40 + 10}px)`;
    }

    noBtn.addEventListener('mousemove', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNoButton();
    });

      document.getElementById('monthTitle').textContent = 
        new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long', year: 'numeric' });

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = `<div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
                        <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>`;

      for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

      for (let day = 1; day <= daysInMonth; day++) {
        const isPast = (currentYear < todayYear) || 
                      (currentYear === todayYear && currentMonth < todayMonth) ||
                      (currentYear === todayYear && currentMonth === todayMonth && day < todayDate);

        const dayEl = document.createElement('div');
        dayEl.className = `day ${isPast ? 'past' : ''}`;
        dayEl.textContent = day;

        if (!isPast) {
          dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            dayEl.classList.add('selected');
            selectedDate = `${new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long' })} ${day}, ${currentYear}`;
            document.getElementById('nextBtn2').style.display = 'block';
          };
        }
        grid.appendChild(dayEl);
      }
    }

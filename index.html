<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Will You Date Me? ❤️</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&display=swap');

    :root { --pink: #ff4d94; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #fff0f5 0%, #ffe4f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { 
      width: 100%; 
      max-width: 420px; 
      padding: 20px; 
      text-align: center; 
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: var(--pink);
      margin-bottom: 40px;
      line-height: 1.1;
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.5s ease; }

    @keyframes fadeIn { 
      from {opacity:0; transform:translateY(30px);} 
      to {opacity:1; transform:translateY(0);} 
    }

    .yes-btn {
      background: linear-gradient(45deg, #ff4d94, #ff6ba8);
      color: white;
      font-size: 1.7rem;
      font-weight: bold;
      padding: 20px 40px;
      border: none;
      border-radius: 50px;
      width: 85%;
      max-width: 300px;
      margin: 15px auto;
      display: block;
      box-shadow: 0 10px 30px rgba(255,77,148,0.4);
    }

    .no-btn {
      background: white;
      color: #555;
      font-size: 1.1rem;
      padding: 14px 36px;
      border: 2px solid #ddd;
      border-radius: 50px;
      margin: 15px auto;
      display: block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    /* Rest of styles */
    .calendar, .dinner-grid, .final-message { /* same as before */ }
    .calendar { background: white; border-radius: 20px; padding: 15px; margin: 20px auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--pink); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .weekday { font-size: 0.9rem; color: #888; padding: 5px 0; }
    .day { padding: 12px 8px; border-radius: 12px; cursor: pointer; font-size: 1.05rem; }
    .day.past { color: #ccc; pointer-events: none; }
    .day.selected { background: var(--pink); color: white; }
    .food-option { background: white; border-radius: 18px; padding: 15px 10px; margin: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .food-emoji { font-size: 2.8rem; margin-bottom: 6px; }
    .final-message { font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: var(--pink); line-height: 1.2; margin: 30px 0; }
  </style>
</head>
<body>
  <div class="container">

    <div id="screen1" class="screen active">
      <h1>Will you date me?</h1>
      <button id="yesBtn1" class="yes-btn">YES ❤️</button>
      <button id="noBtn" class="no-btn">No</button>
    </div>

    <div id="screen2" class="screen">
      <h1>When are we going? 🌹</h1>
      <div class="calendar">
        <div class="calendar-header">
          <button onclick="prevMonth()">←</button>
          <span id="monthTitle"></span>
          <button onclick="nextMonth()">→</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <select id="time" style="padding:14px; font-size:1.1rem; border-radius:12px; border:2px solid #ffb3d1; margin:15px auto; width:85%; display:block;">
        <option value="">Choose Time</option>
        <option value="7:00 PM - 9:00 PM">7:00 PM - 9:00 PM</option>
        <option value="8:00 PM - 10:00 PM">8:00 PM - 10:00 PM</option>
        <option value="9:00 PM - 11:00 PM">9:00 PM - 11:00 PM</option>
        <option value="10:00 PM - 12:00 AM">10:00 PM - 12:00 AM 🌙</option>
      </select>
      <button id="nextBtn2" class="yes-btn" style="display:none;">Next →</button>
    </div>

    <div id="screen3" class="screen">
      <h1>What should we eat? 🍽️</h1>
      <div class="dinner-grid" id="foodGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:25px 0;"></div>
      <button id="proceedBtn" class="yes-btn" style="display:none;">Proceed ❤️</button>
    </div>

    <div id="screen4" class="screen">
      <div class="final-message">Our date is set!<br>Can't wait to see you ❤️</div>
      <p id="dateSummary" style="font-size:1.3rem; color:#444; margin-top:20px;"></p>
    </div>
  </div>

  <script>
    let selectedDate = "";
    let selectedFood = "";
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    // Button Setup
    document.getElementById('yesBtn1').addEventListener('click', () => nextScreen(2));
    
    const noBtn = document.getElementById('noBtn');
    function moveNoButton() {
      const x = (Math.random() * 160) - 70;
      noBtn.style.transform = `translate(${x}px, ${Math.random()*50 + 10}px)`;
    }
    noBtn.addEventListener('mousemove', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

    function renderCalendar() {
      // ... (same calendar code as previous version)
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();
      const todayDate = today.getDate();
      const todayMonth = today.getMonth();
      const todayYear = today.getFullYear();

      document.getElementById('monthTitle').textContent = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long', year: 'numeric' });

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = `<div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
                        <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>`;

      for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

      for (let day = 1; day <= daysInMonth; day++) {
        const isPast = (currentYear < todayYear) || 
                      (currentYear === todayYear && currentMonth < todayMonth) ||
                      (currentYear === todayYear && currentMonth === todayMonth && day < todayDate);

        const dayEl = document.createElement('div');
        dayEl.className = `day ${isPast ? 'past' : ''}`;
        dayEl.textContent = day;
        if (!isPast) {
          dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            dayEl.classList.add('selected');
            selectedDate = `${new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long' })} ${day}, ${currentYear}`;
            document.getElementById('nextBtn2').style.display = 'block';
            document.getElementById('nextBtn2').onclick = () => nextScreen(3);
          };
        }
        grid.appendChild(dayEl);
      }
    }

    function prevMonth() { currentMonth--; if(currentMonth < 0){ currentMonth=11; currentYear--; } renderCalendar(); }
    function nextMonth() { currentMonth++; if(currentMonth > 11){ currentMonth=0; currentYear++; } renderCalendar(); }

    const foods = [{emoji:"🍕",name:"Pizza"},{emoji:"🍔",name:"Burger"},{emoji:"🍝",name:"Pasta"},{emoji:"🍣",name:"Sushi"},{emoji:"🥩",name:"Steak"},{emoji:"🍜",name:"Ramen"}];

    function createFoodOptions() {
      const grid = document.getElementById('foodGrid');
      grid.innerHTML = '';
      foods.forEach(food => {
        const div = document.createElement('div');
        div.className = 'food-option';
        div.innerHTML = `<div class="food-emoji">\( {food.emoji}</div><div style="font-weight:600;"> \){food.name}</div>`;
        div.onclick = () => {
          document.querySelectorAll('.food-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedFood = food.name;
